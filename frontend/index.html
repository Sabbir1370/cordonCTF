<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CordonCTF – Offline CTF Platform</title>
    <!-- Bootstrap 5 CSS -->
    <link
      href="css/vendor/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4">
      <div class="container">
        <a class="navbar-brand" href="index.html">🏴‍☠️ CordonCTF</a>
        <div class="d-flex">
          <a href="login.html" class="btn btn-outline-primary me-2">Login</a>
          <a href="register.html" class="btn btn-primary">Register</a>
        </div>
      </div>
    </nav>

    <div class="container">
      <!-- Status row -->
      <div class="row g-3 mb-4">
        <div class="col-md-3 col-6">
          <div class="card text-bg-light">
            <div class="card-body text-center">
              <h6 class="card-title">Event Status</h6>
              <span id="eventStatus" class="badge bg-secondary fs-6"
                >Loading...</span
              >
            </div>
          </div>
        </div>
        <div class="col-md-3 col-6">
          <div class="card text-bg-light">
            <div class="card-body text-center">
              <h6 class="card-title">Participants</h6>
              <strong id="totalParticipants">0</strong>
            </div>
          </div>
        </div>
        <div class="col-md-3 col-6">
          <div class="card text-bg-light">
            <div class="card-body text-center">
              <h6 class="card-title">Challenges</h6>
              <strong id="totalChallenges">0</strong>
            </div>
          </div>
        </div>
        <div class="col-md-3 col-6">
          <div class="card text-bg-light">
            <div class="card-body text-center">
              <h6 class="card-title">Solves</h6>
              <strong id="totalSolves">0</strong>
            </div>
          </div>
        </div>
      </div>

      <!-- Scoreboard -->
      <div class="card">
        <div class="card-header">
          <h5 class="mb-0">🏆 Scoreboard</h5>
        </div>
        <div class="card-body">
          <div id="scoreboardTable" class="table-responsive">
            <p>Loading...</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="js/vendor/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script>
      window.addEventListener("DOMContentLoaded", () => {
        loadEventStatus();
        loadStats();
        loadScoreboard();
      });

      async function loadEventStatus() {
        try {
          const data = await api("GET", "/api/event/status");
          const el = document.getElementById("eventStatus");
          el.textContent = data.status.toUpperCase();
          el.className = `badge fs-6 ${data.status === "running" ? "bg-success" : "bg-secondary"}`;
        } catch {
          document.getElementById("eventStatus").textContent = "Error";
        }
      }

      async function loadStats() {
        try {
          const stats = await api("GET", "/api/stats");
          document.getElementById("totalParticipants").textContent =
            stats.total_participants;
          document.getElementById("totalChallenges").textContent =
            stats.total_challenges;
          document.getElementById("totalSolves").textContent =
            stats.total_solves;
        } catch {}
      }

      async function loadScoreboard() {
        try {
          const board = await api("GET", "/api/scoreboard");
          const container = document.getElementById("scoreboardTable");
          if (!board.length) {
            container.innerHTML =
              '<div class="alert alert-info">No players yet.</div>';
            return;
          }
          let html = `
            <table class="table table-striped table-hover">
              <thead class="table-primary">
                <tr><th>#</th><th>Username</th><th>Score</th><th>Solves</th></tr>
              </thead>
              <tbody>
          `;
          board.forEach((entry) => {
            html += `<tr>
              <td>${entry.rank}</td>
              <td>${entry.username}</td>
              <td>${entry.score}</td>
              <td>${entry.solve_count}</td>
            </tr>`;
          });
          html += "</tbody></table>";
          container.innerHTML = html;
        } catch {
          document.getElementById("scoreboardTable").innerHTML =
            '<div class="alert alert-danger">Failed to load scoreboard.</div>';
        }
      }
    </script>
  </body>
</html>
