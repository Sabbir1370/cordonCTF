<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CordonCTF – Player Dashboard</title>
    <link href="css/vendor/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav
      class="cc-navbar d-flex align-items-center justify-content-between flex-wrap"
    >
      <a class="cc-brand" href="dashboard.html">CordonCTF</a>
      <span id="eventStatusBadge" class="cc-status-badge closed">LOADING…</span>
      <div class="d-flex align-items-center gap-2">
        <span id="usernameDisplay" class="text-secondary mono small"></span>
        <span class="cc-score-pill"
          >SCORE: <span id="scoreDisplay">0</span></span
        >
        <button onclick="logout()" class="btn btn-sm btn-outline-danger">
          Logout
        </button>
      </div>
    </nav>

    <div class="container-fluid py-4 px-3 px-lg-4">
      <div class="row g-3">
        <!-- Sidebar -->
        <div class="col-lg-3">
          <div class="cc-sidebar">
            <div class="cc-user-card">
              <div class="username" id="sbUsername">—</div>
              <div class="stat-row">
                <span>Score</span><span id="sbScore">0</span>
              </div>
              <div class="stat-row">
                <span>Solves</span><span id="sbSolves">0</span>
              </div>
              <div class="stat-row">
                <span>Rank</span><span id="sbRank">—</span>
              </div>
            </div>

            <button
              class="cc-nav-tab active"
              data-tab="challenges"
              onclick="switchTab('challenges')"
            >
              Challenges
            </button>
            <button
              class="cc-nav-tab"
              data-tab="scoreboard"
              onclick="switchTab('scoreboard')"
            >
              Scoreboard
            </button>
            <button
              class="cc-nav-tab"
              data-tab="profile"
              onclick="switchTab('profile')"
            >
              Profile
            </button>

            <div id="filterSection">
              <div class="cc-filter-heading">Category</div>
              <div id="categoryFilters"></div>

              <div class="cc-filter-heading">Status</div>
              <div class="cc-toggle-group">
                <button
                  class="cc-toggle-btn active"
                  data-solved="all"
                  onclick="setSolvedFilter('all')"
                >
                  All
                </button>
                <button
                  class="cc-toggle-btn"
                  data-solved="unsolved"
                  onclick="setSolvedFilter('unsolved')"
                >
                  Unsolved
                </button>
                <button
                  class="cc-toggle-btn"
                  data-solved="solved"
                  onclick="setSolvedFilter('solved')"
                >
                  Solved
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Main content -->
        <div class="col-lg-9">
          <!-- Challenges pane -->
          <div id="pane-challenges">
            <div id="challengeGrid" class="row g-3"></div>
          </div>

          <!-- Scoreboard pane -->
          <div id="pane-scoreboard" class="d-none">
            <div class="cc-table table-responsive">
              <table class="table">
                <thead>
                  <tr>
                    <th>Rank</th>
                    <th>Username</th>
                    <th>Score</th>
                    <th>Solves</th>
                    <th>Last Solve</th>
                  </tr>
                </thead>
                <tbody id="scoreboardBody"></tbody>
              </table>
            </div>
          </div>

          <!-- Profile pane -->
          <div id="pane-profile" class="d-none">
            <div class="row g-3">
              <div class="col-md-5">
                <div class="cc-panel mb-3">
                  <h6
                    class="text-uppercase mono text-secondary mb-3"
                    style="font-size: 0.78rem; letter-spacing: 1px"
                  >
                    Change Password
                  </h6>
                  <form id="changePasswordForm">
                    <div class="mb-2">
                      <label class="form-label small text-secondary"
                        >Current Password</label
                      >
                      <input
                        type="password"
                        class="form-control form-control-sm"
                        id="currentPassword"
                        required
                      />
                    </div>
                    <div class="mb-2">
                      <label class="form-label small text-secondary"
                        >New Password</label
                      >
                      <input
                        type="password"
                        class="form-control form-control-sm"
                        id="newPassword"
                        required
                        minlength="8"
                      />
                    </div>
                    <div class="mb-3">
                      <label class="form-label small text-secondary"
                        >Confirm New Password</label
                      >
                      <input
                        type="password"
                        class="form-control form-control-sm"
                        id="confirmNewPassword"
                        required
                      />
                    </div>
                    <button type="submit" class="btn btn-cc-primary btn-sm">
                      Update Password
                    </button>
                  </form>
                  <div id="passwordMessage" class="mt-2 small"></div>
                </div>
              </div>
              <div class="col-md-7">
                <div class="cc-panel">
                  <h6
                    class="text-uppercase mono text-secondary mb-3"
                    style="font-size: 0.78rem; letter-spacing: 1px"
                  >
                    Solved Challenges
                  </h6>
                  <div id="solvesList"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Challenge Detail Modal -->
    <div
      class="modal fade"
      id="challengeModal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <div>
              <h5 class="modal-title mb-1" id="detailTitle"></h5>
              <span id="detailCategory"></span>
            </div>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <div class="d-flex align-items-baseline gap-2 mb-3">
              <span
                id="detailPoints"
                class="cc-score-pill"
                style="font-size: 1.1rem"
              ></span>
              <span id="detailSolveCount" class="text-muted small mono"></span>
            </div>
            <p
              id="detailDescription"
              class="text-secondary"
              style="white-space: pre-wrap"
            ></p>

            <div id="detailFile" class="mb-3 d-none">
              <button
                id="detailFileBtn"
                class="btn btn-outline-light btn-sm cc-download-btn"
              >
                ⬇ Download File
              </button>
            </div>

            <div id="detailSolvedBanner" class="cc-solved-banner d-none">
              ✓ Solved
            </div>
            <div id="detailEventClosed" class="text-muted small d-none">
              Event is not currently running.
            </div>

            <div id="submitForm" class="d-none">
              <div class="input-group">
                <input
                  type="text"
                  id="flagInput"
                  class="form-control"
                  placeholder="FLAG{...}"
                />
                <button id="submitFlagBtn" class="btn btn-cc-primary">
                  Submit Flag
                </button>
              </div>
              <div
                id="detailAttempts"
                class="small text-muted mt-2 d-none"
              ></div>
              <div id="submitMessage" class="mt-2 small"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="js/vendor/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
      requireAuth();

      const CATEGORY_CLASS = {
        web: "cat-web",
        crypto: "cat-crypto",
        forensics: "cat-forensics",
        pwn: "cat-pwn",
        misc: "cat-misc",
        rev: "cat-rev",
        reverse: "cat-rev",
      };
      function catClass(name) {
        return CATEGORY_CLASS[(name || "").toLowerCase()] || "cat-misc";
      }
      function escapeHtml(text) {
        return String(text ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      const state = {
        challenges: [],
        activeCategory: null,
        solvedFilter: "all",
        eventLive: false,
      };

      document.getElementById("usernameDisplay").textContent =
        localStorage.getItem("username") || "";
      document.getElementById("sbUsername").textContent =
        localStorage.getItem("username") || "—";

      init();
      async function init() {
        await Promise.all([
          loadEventStatus(),
          loadScore(),
          loadCategories(),
          loadChallenges(),
        ]);
        setInterval(() => {
          if (
            !document
              .getElementById("pane-scoreboard")
              .classList.contains("d-none")
          )
            loadScoreboard();
        }, 30000);
      }

      // ── Tabs ────────────────────────────────────────────────
      function switchTab(tab) {
        document
          .querySelectorAll(".cc-nav-tab")
          .forEach((b) => b.classList.toggle("active", b.dataset.tab === tab));
        document
          .getElementById("pane-challenges")
          .classList.toggle("d-none", tab !== "challenges");
        document
          .getElementById("pane-scoreboard")
          .classList.toggle("d-none", tab !== "scoreboard");
        document
          .getElementById("pane-profile")
          .classList.toggle("d-none", tab !== "profile");
        document
          .getElementById("filterSection")
          .classList.toggle("d-none", tab !== "challenges");
        if (tab === "scoreboard") loadScoreboard();
        if (tab === "profile") loadSolves();
      }

      // ── Event status ───────────────────────────────────────
      async function loadEventStatus() {
        const badge = document.getElementById("eventStatusBadge");
        try {
          const status = await api("GET", "/api/event/status");
          state.eventLive =
            status.status === "live" || status.status === "running";
          badge.textContent = state.eventLive ? "LIVE" : "CLOSED";
          badge.classList.toggle("live", state.eventLive);
          badge.classList.toggle("closed", !state.eventLive);
        } catch (err) {
          badge.textContent = "UNKNOWN";
        }
      }

      async function loadScore() {
        try {
          const data = await api("GET", "/api/me/score");
          document.getElementById("scoreDisplay").textContent = data.score;
          document.getElementById("sbScore").textContent = data.score;
        } catch (err) {
          console.error(err);
        }
      }

      // ── Categories ─────────────────────────────────────────
      async function loadCategories() {
        try {
          const cats = await api("GET", "/api/categories");
          const container = document.getElementById("categoryFilters");
          container.innerHTML =
            `<button class="cc-cat-btn active" data-catid="" onclick="setCategory(null, this)">All</button>` +
            cats
              .map(
                (c) =>
                  `<button class="cc-cat-btn" data-catid="${c.id}" onclick="setCategory('${c.id}', this)">${escapeHtml(c.name)}</button>`,
              )
              .join("");
        } catch (err) {
          console.error(err);
        }
      }

      function setCategory(catId, btn) {
        state.activeCategory = catId;
        document
          .querySelectorAll(".cc-cat-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        loadChallenges(catId);
      }

      function setSolvedFilter(filter) {
        state.solvedFilter = filter;
        document
          .querySelectorAll(".cc-toggle-btn")
          .forEach((b) =>
            b.classList.toggle("active", b.dataset.solved === filter),
          );
        renderChallenges();
      }

      // ── Challenges ─────────────────────────────────────────
      async function loadChallenges(categoryId = null) {
        try {
          let url = "/api/challenges";
          if (categoryId) url += "?category=" + categoryId;
          state.challenges = await api("GET", url);
          renderChallenges();
        } catch (err) {
          console.error(err);
        }
      }

      function renderChallenges() {
        let list = state.challenges;
        if (state.solvedFilter === "solved")
          list = list.filter((c) => c.solved);
        if (state.solvedFilter === "unsolved")
          list = list.filter((c) => !c.solved);

        const grid = document.getElementById("challengeGrid");
        if (!list.length) {
          grid.innerHTML = `<div class="col-12"><div class="cc-empty">No challenges match this view.</div></div>`;
          return;
        }
        grid.innerHTML = list
          .map(
            (ch) => `
          <div class="col-md-6 col-xl-4">
            <div class="cc-challenge-card ${ch.solved ? "solved" : ""}" onclick="viewChallenge(${ch.id})">
              <span class="cc-badge ${catClass(ch.category)}">${escapeHtml(ch.category || "misc")}</span>
              <div class="title mt-2">${escapeHtml(ch.title)}</div>
              <div class="current-points">${ch.current_points}</div>
              ${ch.base_points ? `<div class="base-points">base: ${ch.base_points} pts</div>` : ""}
              <div class="mt-2">
                ${
                  ch.solved
                    ? `<span class="solved-check">✓ Solved</span>`
                    : ch.attempts_remaining !== null &&
                        ch.attempts_remaining !== undefined
                      ? `<span class="attempts-left">${ch.attempts_remaining} attempts left</span>`
                      : ""
                }
              </div>
            </div>
          </div>
        `,
          )
          .join("");
      }

      // ── Challenge modal ────────────────────────────────────
      const challengeModalEl = document.getElementById("challengeModal");
      const challengeModal = new bootstrap.Modal(challengeModalEl);

      async function viewChallenge(id) {
        try {
          const ch = await api("GET", "/api/challenges/" + id);
          document.getElementById("detailTitle").textContent = ch.title;
          document.getElementById("detailCategory").innerHTML =
            `<span class="cc-badge ${catClass(ch.category)}">${escapeHtml(ch.category || "misc")}</span>`;
          document.getElementById("detailPoints").textContent =
            `${ch.current_points} pts`;
          document.getElementById("detailSolveCount").textContent =
            ch.solve_count !== undefined ? `${ch.solve_count} solves` : "";
          document.getElementById("detailDescription").textContent =
            ch.description || "No description.";

          const fileDiv = document.getElementById("detailFile");
          const fileBtn = document.getElementById("detailFileBtn");
          const newBtn = fileBtn.cloneNode(true);
          fileBtn.parentNode.replaceChild(newBtn, fileBtn);
          if (ch.file_exists) {
            fileDiv.classList.remove("d-none");
            newBtn.addEventListener("click", (e) => {
              e.preventDefault();
              downloadChallengeFile(id);
            });
          } else {
            fileDiv.classList.add("d-none");
          }

          const solvedBanner = document.getElementById("detailSolvedBanner");
          const eventClosedMsg = document.getElementById("detailEventClosed");
          const submitForm = document.getElementById("submitForm");
          const attemptsDiv = document.getElementById("detailAttempts");
          const flagInput = document.getElementById("flagInput");
          const submitBtn = document.getElementById("submitFlagBtn");
          const submitMsg = document.getElementById("submitMessage");
          submitMsg.innerHTML = "";
          flagInput.value = "";

          if (ch.solved) {
            solvedBanner.classList.remove("d-none");
            eventClosedMsg.classList.add("d-none");
            submitForm.classList.add("d-none");
          } else if (!state.eventLive) {
            solvedBanner.classList.add("d-none");
            eventClosedMsg.classList.remove("d-none");
            submitForm.classList.add("d-none");
          } else {
            solvedBanner.classList.add("d-none");
            eventClosedMsg.classList.add("d-none");
            submitForm.classList.remove("d-none");

            if (
              ch.attempts_remaining !== null &&
              ch.attempts_remaining !== undefined
            ) {
              attemptsDiv.classList.remove("d-none");
              attemptsDiv.textContent = `${ch.attempts_remaining} attempts remaining`;
              submitBtn.disabled = ch.attempts_remaining <= 0;
            } else {
              attemptsDiv.classList.add("d-none");
              submitBtn.disabled = false;
            }
            submitBtn.onclick = () => submitFlag(id);
          }

          challengeModal.show();
        } catch (err) {
          console.error(err);
        }
      }

      async function submitFlag(challengeId) {
        const flag = document.getElementById("flagInput").value.trim();
        const msg = document.getElementById("submitMessage");
        if (!flag) return;
        try {
          const res = await api("POST", "/api/submit", {
            challenge_id: challengeId,
            flag,
          });
          msg.innerHTML = `<span class="${res.correct ? "text-success" : "text-danger"}">${escapeHtml(res.message || "")}</span>`;
          if (res.correct) {
            loadScore();
            loadChallenges(state.activeCategory);
            viewChallenge(challengeId);
          } else {
            viewChallenge(challengeId);
          }
        } catch (err) {
          if (err.status === 429) {
            msg.innerHTML = `<span class="text-danger">${escapeHtml(err.message)}</span>`;
            document.getElementById("submitFlagBtn").disabled = true;
            const attemptsDiv = document.getElementById("detailAttempts");
            attemptsDiv.classList.remove("d-none");
            attemptsDiv.textContent = "No attempts remaining";
          } else {
            msg.innerHTML = `<span class="text-danger">${escapeHtml(err.message)}</span>`;
          }
        }
      }

      async function downloadChallengeFile(challengeId) {
        const token = localStorage.getItem("access_token");
        if (!token) return;
        try {
          const response = await fetch(
            `${API_BASE}/api/challenges/${challengeId}/download`,
            {
              headers: { Authorization: `Bearer ${token}` },
            },
          );
          if (!response.ok)
            throw new Error(
              (await response.json()).detail || "Download failed",
            );
          const blob = await response.blob();
          const disposition = response.headers.get("Content-Disposition");
          let filename = "challenge_file";
          if (disposition) {
            const match = disposition.match(/filename="(.+)"/);
            if (match) filename = match[1];
          }
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          a.remove();
          window.URL.revokeObjectURL(url);
        } catch (err) {
          alert(err.message);
        }
      }

      // ── Scoreboard ─────────────────────────────────────────
      async function loadScoreboard() {
        try {
          const board = await api("GET", "/api/scoreboard");
          const me = localStorage.getItem("username");
          const body = document.getElementById("scoreboardBody");
          if (!board.length) {
            body.innerHTML = `<tr><td colspan="5" class="cc-empty">Scoreboard is empty.</td></tr>`;
            return;
          }
          body.innerHTML = board
            .map((e) => {
              const isMe = e.username === me;
              const isFirst = e.rank === 1;
              return `<tr class="${isMe ? "me" : ""} ${isFirst ? "first-place" : ""}">
              <td>#${e.rank}</td>
              <td>${escapeHtml(e.username)}</td>
              <td class="mono">${e.score}</td>
              <td>${e.solve_count}</td>
              <td class="text-muted small">${e.last_solve_at ? new Date(e.last_solve_at).toLocaleString() : "—"}</td>
            </tr>`;
            })
            .join("");

          const mine = board.find((e) => e.username === me);
          if (mine) {
            document.getElementById("sbRank").textContent = "#" + mine.rank;
            document.getElementById("sbSolves").textContent = mine.solve_count;
            document.getElementById("sbScore").textContent = mine.score;
          }
        } catch (err) {
          console.error(err);
        }
      }

      // ── Profile ────────────────────────────────────────────
      async function loadSolves() {
        try {
          const solves = await api("GET", "/api/me/solves");
          const list = document.getElementById("solvesList");
          if (!solves.length) {
            list.innerHTML = `<div class="cc-empty">No solves yet.</div>`;
            return;
          }
          list.innerHTML = solves
            .map(
              (s) => `
            <div class="d-flex justify-content-between align-items-center py-2" style="border-bottom:1px solid var(--border);">
              <span>${escapeHtml(s.title)}</span>
              <span class="mono text-secondary">${s.points} pts</span>
              <span class="text-muted small">${new Date(s.solved_at).toLocaleString()}</span>
            </div>`,
            )
            .join("");
        } catch (err) {
          console.error(err);
        }
      }

      document
        .getElementById("changePasswordForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const currentPassword =
            document.getElementById("currentPassword").value;
          const newPassword = document.getElementById("newPassword").value;
          const confirmPassword =
            document.getElementById("confirmNewPassword").value;
          const msg = document.getElementById("passwordMessage");

          if (newPassword !== confirmPassword) {
            msg.innerHTML = `<span class="text-danger">New passwords do not match.</span>`;
            return;
          }
          try {
            await api("PUT", "/api/me/password", {
              current_password: currentPassword,
              new_password: newPassword,
            });
            msg.innerHTML = `<span class="text-success">Password changed successfully.</span>`;
            document.getElementById("changePasswordForm").reset();
          } catch (err) {
            msg.innerHTML = `<span class="text-danger">${escapeHtml(err.message)}</span>`;
          }
        });
    </script>
  </body>
</html>
