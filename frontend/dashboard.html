<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CordonCTF – Player Dashboard</title>
    <link
      href="css/vendor/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4">
      <div class="container">
        <a class="navbar-brand" href="dashboard.html">🏴‍☠️ CordonCTF</a>
        <div class="d-flex align-items-center">
          <span class="me-3" id="usernameDisplay"></span>
          <span class="badge bg-primary me-3"
            >Score: <span id="scoreDisplay">0</span></span
          >
          <button onclick="logout()" class="btn btn-outline-danger btn-sm">
            Logout
          </button>
        </div>
      </div>
    </nav>

    <div class="container">
      <!-- Tabs -->
      <ul class="nav nav-pills mb-4" id="dashboardTabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button
            class="nav-link active"
            data-bs-toggle="pill"
            data-bs-target="#tab-challenges"
            type="button"
          >
            Challenges
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button
            class="nav-link"
            data-bs-toggle="pill"
            data-bs-target="#tab-solves"
            type="button"
            onclick="loadSolves()"
          >
            My Solves
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button
            class="nav-link"
            data-bs-toggle="pill"
            data-bs-target="#tab-scoreboard"
            type="button"
            onclick="loadScoreboard()"
          >
            Scoreboard
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button
            class="nav-link"
            data-bs-toggle="pill"
            data-bs-target="#tab-password"
            type="button"
          >
            Change Password
          </button>
        </li>
      </ul>

      <div class="tab-content">
        <!-- Challenges Tab -->
        <div class="tab-pane fade show active" id="tab-challenges">
          <div class="row">
            <div class="col-md-3">
              <h5>Categories</h5>
              <div id="categoryList" class="d-grid gap-2 mb-3"></div>
            </div>
            <div class="col-md-9">
              <h5>Challenges</h5>
              <div id="challengeList" class="row"></div>
              <!-- Challenge detail card (hidden by default) -->
              <div id="challengeDetail" class="card mt-3 d-none">
                <div class="card-body">
                  <h4 id="detailTitle" class="card-title"></h4>
                  <p>
                    <strong>Category:</strong> <span id="detailCategory"></span>
                  </p>
                  <p>
                    <strong>Current Points:</strong>
                    <span id="detailPoints"></span>
                  </p>
                  <p>
                    <strong>Description:</strong>
                    <span id="detailDescription"></span>
                  </p>
                  <div id="detailFile" class="mb-2 d-none">
                    <button
                      id="detailFileBtn"
                      class="btn btn-outline-secondary btn-sm"
                    >
                      ⬇ Download Challenge File
                    </button>
                  </div>
                  <p id="detailSolved" class="text-success fw-bold d-none">
                    ✅ Already Solved
                  </p>
                  <p id="detailAttempts" class="d-none"></p>
                  <div id="submitForm" class="input-group mt-3">
                    <input
                      type="text"
                      id="flagInput"
                      class="form-control"
                      placeholder="FLAG{...}"
                    />
                    <button id="submitFlagBtn" class="btn btn-primary">
                      Submit Flag
                    </button>
                  </div>
                  <div id="submitMessage" class="mt-2"></div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Solves Tab -->
        <div class="tab-pane fade" id="tab-solves">
          <h4>My Solves</h4>
          <div id="solvesList"></div>
        </div>

        <!-- Scoreboard Tab -->
        <div class="tab-pane fade" id="tab-scoreboard">
          <h4>Scoreboard</h4>
          <div id="scoreboardTable" class="table-responsive"></div>
        </div>

        <!-- Change Password Tab -->
        <div class="tab-pane fade" id="tab-password">
          <h4>Change Password</h4>
          <form id="changePasswordForm">
            <div class="mb-3">
              <label for="currentPassword" class="form-label"
                >Current Password</label
              >
              <input
                type="password"
                class="form-control"
                id="currentPassword"
                required
              />
            </div>
            <div class="mb-3">
              <label for="newPassword" class="form-label">New Password</label>
              <input
                type="password"
                class="form-control"
                id="newPassword"
                required
              />
            </div>
            <button type="submit" class="btn btn-primary">
              Update Password
            </button>
          </form>
          <div id="passwordMessage" class="mt-2"></div>
        </div>
      </div>
    </div>

    <script src="js/vendor/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
      requireAuth();
      const usernameDisplay = document.getElementById("usernameDisplay");
      const scoreDisplay = document.getElementById("scoreDisplay");
      usernameDisplay.textContent = localStorage.getItem("username");
      updateScore();

      // Load categories and challenges on page load
      loadCategories();
      loadChallenges();

      async function updateScore() {
        try {
          const data = await api("GET", "/api/me/score");
          scoreDisplay.textContent = data.score;
        } catch {}
      }

      async function loadCategories() {
        try {
          const categories = await api("GET", "/api/categories");
          const catList = document.getElementById("categoryList");
          catList.innerHTML = categories
            .map(
              (cat) =>
                `<button class="btn btn-outline-primary btn-sm category-btn" data-catid="${cat.id}">${cat.name}</button>`,
            )
            .join("");
          document.querySelectorAll(".category-btn").forEach((btn) => {
            btn.addEventListener("click", () =>
              loadChallenges(btn.dataset.catid),
            );
          });
        } catch (err) {
          console.error(err);
        }
      }

      async function loadChallenges(categoryId = null) {
        try {
          let url = "/api/challenges";
          if (categoryId) url += "?category=" + categoryId;
          const challenges = await api("GET", url);
          const list = document.getElementById("challengeList");
          if (!challenges.length) {
            list.innerHTML =
              '<div class="col-12"><div class="alert alert-info">No challenges in this category.</div></div>';
            return;
          }
          list.innerHTML = challenges
            .map(
              (ch) => `
            <div class="col-md-6 col-lg-4 mb-3">
              <div class="card challenge-card ${ch.solved ? "solved" : ""}">
                <div class="card-body">
                  <h6 class="card-title">${ch.title}</h6>
                  <p class="card-text">
                    <span class="badge bg-secondary">${ch.category}</span>
                    ${ch.base_points ? `<br><small>Base: ${ch.base_points} pts</small>` : ""}
                    <br><strong>${ch.current_points} pts</strong>
                    ${ch.solved ? " ✅" : ""}
                    ${ch.attempts_remaining !== null && ch.attempts_remaining !== undefined ? `<br><small>${ch.attempts_remaining} tries left</small>` : ""}
                  </p>
                  <button class="btn btn-primary btn-sm" onclick="viewChallenge(${ch.id})">View</button>
                </div>
              </div>
            </div>
          `,
            )
            .join("");
        } catch (err) {
          console.error(err);
        }
      }

      async function viewChallenge(id) {
        try {
          const ch = await api("GET", "/api/challenges/" + id);
          const detail = document.getElementById("challengeDetail");
          detail.classList.remove("d-none");
          document.getElementById("detailTitle").textContent = ch.title;
          document.getElementById("detailCategory").textContent = ch.category;
          document.getElementById("detailPoints").textContent =
            ch.current_points +
            (ch.base_points ? ` (base: ${ch.base_points})` : "");
          document.getElementById("detailDescription").textContent =
            ch.description || "No description.";

          // File download button
          const fileDiv = document.getElementById("detailFile");
          const fileBtn = document.getElementById("detailFileBtn");
          // Remove old handler
          const newBtn = fileBtn.cloneNode(true);
          fileBtn.parentNode.replaceChild(newBtn, fileBtn);
          if (ch.file_exists) {
            fileDiv.classList.remove("d-none");
            newBtn.addEventListener("click", (e) => {
              e.preventDefault();
              downloadChallengeFile(id);
            });
          } else {
            fileDiv.classList.add("d-none");
          }

          const solvedBadge = document.getElementById("detailSolved");
          const submitForm = document.getElementById("submitForm");
          const attemptsPara = document.getElementById("detailAttempts");
          const flagInput = document.getElementById("flagInput");
          const submitFlagBtn = document.getElementById("submitFlagBtn");
          const submitMsg = document.getElementById("submitMessage");

          if (ch.solved) {
            solvedBadge.classList.remove("d-none");
            submitForm.classList.add("d-none");
            attemptsPara.classList.add("d-none");
          } else {
            solvedBadge.classList.add("d-none");
            submitForm.classList.remove("d-none");
            flagInput.value = "";
            submitMsg.innerHTML = "";

            if (
              ch.attempts_remaining !== null &&
              ch.attempts_remaining !== undefined
            ) {
              attemptsPara.classList.remove("d-none");
              attemptsPara.textContent = `Attempts remaining: ${ch.attempts_remaining}`;
              if (ch.attempts_remaining <= 0) {
                attemptsPara.classList.add("text-danger");
                submitFlagBtn.disabled = true;
              } else {
                attemptsPara.classList.remove("text-danger");
                submitFlagBtn.disabled = false;
              }
            } else {
              attemptsPara.classList.add("d-none");
              submitFlagBtn.disabled = false;
            }
            // Bind submission
            submitFlagBtn.onclick = () => submitFlag(id);
          }
        } catch (err) {
          console.error(err);
        }
      }

      async function submitFlag(challengeId) {
        const flag = document.getElementById("flagInput").value.trim();
        const msg = document.getElementById("submitMessage");
        if (!flag) return;
        try {
          const res = await api("POST", "/api/submit", {
            challenge_id: challengeId,
            flag,
          });
          msg.innerHTML = `<span class="${res.correct ? "text-success" : "text-danger"}">${res.message}</span>`;
          if (res.correct) {
            updateScore();
            loadChallenges();
            viewChallenge(challengeId); // refresh to show solved
          } else {
            viewChallenge(challengeId); // update attempts
          }
        } catch (err) {
          if (err.status === 429) {
            msg.innerHTML = `<span class="text-danger">${err.message}</span>`;
            document.getElementById("submitFlagBtn").disabled = true;
            const attemptsPara = document.getElementById("detailAttempts");
            attemptsPara.classList.remove("d-none");
            attemptsPara.textContent = "No attempts remaining";
            attemptsPara.classList.add("text-danger");
          } else {
            msg.innerHTML = `<span class="text-danger">${err.message}</span>`;
          }
        }
      }

      async function loadSolves() {
        try {
          const solves = await api("GET", "/api/me/solves");
          const list = document.getElementById("solvesList");
          if (!solves.length) {
            list.innerHTML =
              '<div class="alert alert-info">No solves yet.</div>';
            return;
          }
          list.innerHTML = solves
            .map(
              (s) =>
                `<div class="d-flex justify-content-between border-bottom py-2">
              <span>${s.title}</span>
              <span>${s.points} pts</span>
              <small>${new Date(s.solved_at).toLocaleString()}</small>
            </div>`,
            )
            .join("");
        } catch (err) {
          console.error(err);
        }
      }

      async function loadScoreboard() {
        try {
          const board = await api("GET", "/api/scoreboard");
          const container = document.getElementById("scoreboardTable");
          if (!board.length) {
            container.innerHTML =
              '<div class="alert alert-info">Scoreboard is empty.</div>';
            return;
          }
          let html = `
            <table class="table table-striped table-hover">
              <thead class="table-primary"><tr><th>#</th><th>Username</th><th>Score</th><th>Solves</th></tr></thead>
              <tbody>
          `;
          board.forEach((e) => {
            html += `<tr><td>${e.rank}</td><td>${e.username}</td><td>${e.score}</td><td>${e.solve_count}</td></tr>`;
          });
          html += "</tbody></table>";
          container.innerHTML = html;
        } catch (err) {
          console.error(err);
        }
      }

      async function downloadChallengeFile(challengeId) {
        const token = localStorage.getItem("access_token");
        if (!token) return;
        try {
          const response = await fetch(
            `${API_BASE}/api/challenges/${challengeId}/download`,
            {
              headers: { Authorization: `Bearer ${token}` },
            },
          );
          if (!response.ok)
            throw new Error(
              (await response.json()).detail || "Download failed",
            );
          const blob = await response.blob();
          const disposition = response.headers.get("Content-Disposition");
          let filename = "challenge_file";
          if (disposition) {
            const match = disposition.match(/filename="(.+)"/);
            if (match) filename = match[1];
          }
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          a.remove();
          window.URL.revokeObjectURL(url);
        } catch (err) {
          alert(err.message);
        }
      }

      // Change Password
      document
        .getElementById("changePasswordForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const currentPassword =
            document.getElementById("currentPassword").value;
          const newPassword = document.getElementById("newPassword").value;
          const msg = document.getElementById("passwordMessage");
          try {
            await api("PUT", "/api/me/password", {
              current_password: currentPassword,
              new_password: newPassword,
            });
            msg.innerHTML =
              '<span class="text-success">Password changed successfully.</span>';
            document.getElementById("changePasswordForm").reset();
          } catch (err) {
            msg.innerHTML = `<span class="text-danger">${err.message}</span>`;
          }
        });
    </script>
  </body>
</html>
